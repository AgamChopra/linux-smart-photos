<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Linux Smart Photos app icon">
  <title>Linux Smart Photos</title>
  <defs>
    <linearGradient id="iconBackground" x1="118" y1="132" x2="906" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8F2EA"/>
      <stop offset="0.48" stop-color="#F2F2EF"/>
      <stop offset="1" stop-color="#E6F0FA"/>
    </linearGradient>
    <radialGradient id="creamCenter" cx="45%" cy="38%" r="70%">
      <stop offset="0" stop-color="#FFF9EA"/>
      <stop offset="1" stop-color="#FFF3DD"/>
    </radialGradient>
    <radialGradient id="purpleNavy" cx="40%" cy="35%" r="70%">
      <stop offset="0" stop-color="#2D1B4E"/>
      <stop offset="1" stop-color="#1E1740"/>
    </radialGradient>
    <filter id="softIconShadow" x="-12%" y="-12%" width="124%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="none"/>
  <g filter="url(#softIconShadow)">
    <rect x="80" y="80" width="864" height="864" rx="142" fill="url(#iconBackground)" stroke="#111114" stroke-opacity="0.22" stroke-width="1.5"/>
  </g>

  <g id="flower" transform="translate(0 0)">
    <g transform="rotate(0 512 512)">
      <ellipse cx="512" cy="354" rx="116" ry="168" fill="#B56BE8" fill-opacity="0.76"/>
    </g>
    <g transform="rotate(45 512 512)">
      <ellipse cx="512" cy="354" rx="116" ry="168" fill="#A657D6" fill-opacity="0.76"/>
    </g>
    <g transform="rotate(90 512 512)">
      <ellipse cx="512" cy="354" rx="116" ry="168" fill="#C77CFF" fill-opacity="0.76"/>
    </g>
    <g transform="rotate(135 512 512)">
      <ellipse cx="512" cy="354" rx="116" ry="168" fill="#A657D6" fill-opacity="0.76"/>
    </g>
    <g transform="rotate(180 512 512)">
      <ellipse cx="512" cy="354" rx="116" ry="168" fill="#B56BE8" fill-opacity="0.76"/>
    </g>
    <g transform="rotate(225 512 512)">
      <ellipse cx="512" cy="354" rx="116" ry="168" fill="#8E44C7" fill-opacity="0.64"/>
    </g>
    <g transform="rotate(270 512 512)">
      <ellipse cx="512" cy="354" rx="116" ry="168" fill="#C77CFF" fill-opacity="0.74"/>
    </g>
    <g transform="rotate(315 512 512)">
      <ellipse cx="512" cy="354" rx="116" ry="168" fill="#A657D6" fill-opacity="0.74"/>
    </g>
  </g>

  <circle cx="512" cy="512" r="108" fill="url(#creamCenter)"/>
  <circle cx="512" cy="512" r="46" fill="url(#purpleNavy)"/>
</svg>
